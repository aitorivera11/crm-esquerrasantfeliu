<article class="card card-panel h-100">
    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
        <div>
            <h3 class="h5 mb-1"><a class="text-decoration-none" href="{% url 'agenda:acte_detail' acte.pk %}">{{ acte.titol }}</a></h3>
            <div class="text-muted small">{{ acte.inici|date:'d/m/Y H:i' }} · {{ acte.ubicacio }}</div>
        </div>
        {% if acte.estat == 'PUBLICAT' %}<span class="badge text-bg-success">Publicat</span>{% else %}<span class="badge text-bg-warning">Esborrany</span>{% endif %}
    </div>
    <p class="text-muted">{{ acte.descripcio|default:'Sense descripció addicional.'|truncatechars:140 }}</p>
    <div class="d-flex justify-content-between align-items-center mt-auto">
        <small class="text-muted"><strong>{{ acte.participants.count }}</strong> participants registrats</small>
        <a href="{% url 'agenda:acte_detail' acte.pk %}" class="btn btn-sm btn-outline-primary">Obrir</a>
    </div>
</article>
