<nav class="sidebar-nav">
    <a href="{% url 'core:home' %}" class="nav-link-side {% if request.resolver_match.namespace == 'core' %}active{% endif %}">Dashboard</a>
    <div class="nav-group {% if request.resolver_match.namespace == 'agenda' %}open{% endif %}">
        <a href="{% url 'agenda:acte_list' %}" class="nav-link-side {% if request.resolver_match.namespace == 'agenda' and request.resolver_match.url_name != 'els_meus_actes' %}active{% endif %}">Agenda</a>
        <div class="nav-submenu">
            <a href="{% url 'agenda:els_meus_actes' %}" class="nav-link-sub {% if request.resolver_match.url_name == 'els_meus_actes' %}active{% endif %}">Els meus actes</a>
        </div>
    </div>
    <a href="{% url 'persones:persona_list' %}" class="nav-link-side {% if request.resolver_match.namespace == 'persones' %}active{% endif %}">Persones</a>
    <a href="{% url 'usuaris:perfil' %}" class="nav-link-side {% if request.resolver_match.namespace == 'usuaris' and request.resolver_match.url_name == 'perfil' %}active{% endif %}">El meu perfil</a>
    <a href="{% url 'usuaris:canvi_password' %}" class="nav-link-side {% if request.resolver_match.namespace == 'usuaris' and request.resolver_match.url_name == 'canvi_password' %}active{% endif %}">Contrasenya</a>
    {% if request.user.rol == 'ADMINISTRADOR' %}
        <div class="sidebar-section">Administració</div>
        <a href="{% url 'usuaris:admin_usuari_list' %}" class="nav-link-side nav-link-side-split {% if request.resolver_match.namespace == 'usuaris' and 'admin_usuari' in request.resolver_match.url_name %}active{% endif %}">
            <span>Usuaris</span>
            {% if pending_user_registrations %}
                <span class="sidebar-badge">{{ pending_user_registrations }}</span>
            {% endif %}
        </a>
    {% endif %}
</nav>
