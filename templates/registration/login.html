{% extends 'base.html' %}
{% block title %}Accés{% endblock %}
{% block content %}
<section class="login-shell">
    <div class="login-card card card-panel">
        <div class="login-brand mb-4">
            <img class="login-logo" src="https://www.esquerra.cat/wp-content/uploads/erc-logo.png" alt="Logo Esquerra Republicana">
            <div>
                <p class="eyebrow mb-2">CRM de campanya</p>
                <h1 class="h2 mb-2">Sant Feliu 2026</h1>
                <p class="text-muted mb-0">Accés intern a agenda, persones i coordinació.</p>
            </div>
        </div>
        <form method="post" class="login-form">
            {% csrf_token %}
            {% include 'components/form_fields.html' with form=form %}
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>
        <div class="login-actions mt-4 pt-3 border-top">
            <p class="text-muted mb-2">Encara no tens accés?</p>
            <a href="{% url 'usuaris:registre' %}" class="btn btn-outline-primary w-100">Registrar-me</a>
        </div>
    </div>
</section>
{% endblock %}
