{% extends 'base.html' %}
{% block title %}Accés{% endblock %}
{% block content %}
<section class="login-card card card-panel">
    <p class="eyebrow">CRM de campanya</p>
    <h1 class="h3 mb-3">Accés a la campanya de Sant Feliu</h1>
    <p class="text-muted">Entra per gestionar agenda, persones, equips i coordinació interna.</p>
    <form method="post" class="mt-4">
        {% csrf_token %}
        {% include 'components/form_fields.html' with form=form %}
        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
</section>
{% endblock %}
